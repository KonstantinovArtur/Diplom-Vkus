<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Состав комбо: ' + ${t.name}">Состав комбо</title>
    <style>
        .wrap{max-width:1100px;margin:24px auto;font-family:system-ui,Segoe UI,Arial}
        .card{background:#fff;border:1px solid #e6e9ef;border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(10,20,60,.06)}
        .top{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px}
        .btn{display:inline-block;padding:8px 12px;border-radius:10px;border:1px solid #d8deea;text-decoration:none;color:#0b1b4d;font-weight:700;background:#fff;cursor:pointer}
        .btn:hover{border-color:#0b1b4d}
        .btn.danger{border-color:#fecaca;color:#991b1b;background:#fff}
        .btn.danger:hover{border-color:#991b1b}
        .ok{background:#ecfdf5;border:1px solid #a7f3d0;padding:10px 12px;border-radius:12px;margin:12px 0;color:#065f46;font-weight:700}
        .err{background:#fef2f2;border:1px solid #fecaca;padding:10px 12px;border-radius:12px;margin:12px 0;color:#991b1b;font-weight:700}
        .muted{color:#667085;font-size:13px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        label{display:block;font-size:12px;font-weight:800;color:#0b1b4d;margin-bottom:6px}
        input,select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #d8deea;font:inherit}
        .slot{border:1px solid #e6e9ef;border-radius:14px;padding:12px;margin-top:12px}
        .slot-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .pill{display:inline-flex;gap:8px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid #e6e9ef;font-weight:800;font-size:12px}
        .hr{border:none;border-top:1px solid #eef2f7;margin:16px 0}
        table{width:100%;border-collapse:separate;border-spacing:0 8px}
        th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;text-align:left;color:#425}
        td{background:#fff;border:1px solid #e6e9ef;padding:10px 12px;vertical-align:middle}
        tr td:first-child{border-radius:12px 0 0 12px}
        tr td:last-child{border-radius:0 12px 12px 0}
        .field-err{margin-top:6px;color:#991b1b;font-size:13px;font-weight:700}
    </style>
</head>
<body>

<div class="wrap">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="card">
        <div class="top">
            <div>
                <div style="font-size:20px;font-weight:900;color:#0b1b4d" th:text="'Состав комбо: ' + ${t.name}">Состав</div>
                <div class="muted">
                    Базовая цена: <b th:text="${t.basePrice}">0</b>
                </div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
                <a class="btn" th:href="@{/admin-buffet/combos}">Назад</a>
            </div>
        </div>

        <div th:if="${ok}" class="ok" th:text="${ok}">OK</div>
        <div th:if="${err}" class="err" th:text="${err}">Ошибка</div>
        <div th:if="${prodErr}" class="err" th:text="${prodErr}">Ошибка</div>
        <div th:if="${slotErr}" class="err" th:text="${slotErr}">Ошибка</div>

        <div class="slot">
            <div class="slot-title">
                <div style="font-weight:900;color:#0b1b4d">Добавить слот (например “Еда”, “Напиток”)</div>
            </div>

            <form th:action="@{/admin-buffet/combos/{id}/slots/add(id=${t.id})}" method="post" th:object="${slotForm}">
                <div class="grid">
                    <div>
                        <label>Название слота</label>
                        <input type="text" th:field="*{name}" placeholder="Еда / Напиток">
                    </div>
                    <div>
                        <label>Сколько нужно</label>
                        <input type="text" value="1" readonly>
                        <input type="hidden" th:field="*{requiredQty}" value="1">
                    </div>
                    <div>
                        <label>Порядок</label>
                        <input type="number" th:field="*{sortOrder}">
                    </div>
                    <div style="display:flex;align-items:flex-end">
                        <button class="btn" type="submit">Добавить слот</button>
                    </div>
                </div>
            </form>
        </div>

        <div th:each="s : ${t.slots}" class="slot">
            <div class="slot-title">
                <div>
                    <div style="font-weight:900;color:#0b1b4d" th:text="${s.name}">Слот</div>
                    <div class="muted">
                        requiredQty: <span class="pill" th:text="${s.requiredQty}">1</span>
                        sortOrder: <span class="pill" th:text="${s.sortOrder}">0</span>
                    </div>
                </div>

                <form th:action="@{/admin-buffet/combos/slots/{slotId}/delete(slotId=${s.id})}" method="post" style="margin:0">
                    <input type="hidden" name="templateId" th:value="${t.id}">
                    <button class="btn danger" type="submit" onclick="return confirm('Удалить слот?')">Удалить слот</button>
                </form>
            </div>

            <table>
                <thead>
                <tr>
                    <th>Товар</th>
                    <th>Доплата</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="sp : ${s.products}">
                    <td th:text="${sp.product.name}">Товар</td>
                    <td th:text="${sp.extraPrice != null ? sp.extraPrice : '—'}">—</td>
                    <td style="text-align:right">
                        <form th:action="@{/admin-buffet/combos/slots/{slotId}/products/remove(slotId=${s.id})}" method="post" style="margin:0">
                            <input type="hidden" name="templateId" th:value="${t.id}">
                            <input type="hidden" name="productId" th:value="${sp.product.id}">
                            <button class="btn danger" type="submit" onclick="return confirm('Убрать товар из слота?')">Убрать</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <hr class="hr">

            <form th:action="@{/admin-buffet/combos/slots/{slotId}/products/add(slotId=${s.id})}" method="post"
                  th:object="${slotProductForm}">
                <input type="hidden" name="templateId" th:value="${t.id}">
                <div class="grid">
                    <div>
                        <label>Добавить товар (только из ассортимента буфета)</label>
                        <select th:field="*{productId}">
                            <option value="" disabled selected>-- выберите товар --</option>
                            <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}"></option>
                        </select>
                    </div>
                    <div>
                        <label>Доплата (необязательно)</label>
                        <input type="text" th:field="*{extraPrice}" placeholder="например 20.00 (если этот вариант дороже)">
                        <div class="muted">Если пусто — доплаты нет.</div>
                    </div>
                    <div style="display:flex;align-items:flex-end">
                        <button class="btn" type="submit">Добавить товар</button>
                    </div>
                    <div></div>
                </div>
            </form>

        </div>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

</body>
</html>
