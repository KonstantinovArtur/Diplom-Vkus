<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Комбо-наборы</title>
    <style>
        .wrap{max-width:1100px;margin:24px auto;font-family:system-ui,Segoe UI,Arial}
        .card{background:#fff;border:1px solid #e6e9ef;border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(10,20,60,.06)}
        .top{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px}
        table{width:100%;border-collapse:separate;border-spacing:0 8px}
        th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;text-align:left;color:#425}
        td{background:#fff;border:1px solid #e6e9ef;padding:10px 12px;vertical-align:middle}
        tr td:first-child{border-radius:12px 0 0 12px}
        tr td:last-child{border-radius:0 12px 12px 0}
        .btn{display:inline-block;padding:8px 12px;border-radius:10px;border:1px solid #d8deea;text-decoration:none;color:#0b1b4d;font-weight:700;background:#fff;cursor:pointer}
        .btn:hover{border-color:#0b1b4d}
        .btn.danger{border-color:#fecaca;color:#991b1b;background:#fff}
        .btn.danger:hover{border-color:#991b1b}
        .ok{background:#ecfdf5;border:1px solid #a7f3d0;padding:10px 12px;border-radius:12px;margin:12px 0;color:#065f46;font-weight:700}
        .err{background:#fef2f2;border:1px solid #fecaca;padding:10px 12px;border-radius:12px;margin:12px 0;color:#991b1b;font-weight:700}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        label{display:block;font-size:12px;font-weight:800;color:#0b1b4d;margin-bottom:6px}
        input,select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #d8deea;font:inherit}
        .muted{color:#667085;font-size:13px}
        .actions{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
        .chip{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid #e6e9ef;background:#fff;color:#0b1b4d;font-weight:800;font-size:12px}
        .chip.off{opacity:.55}
        .row-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
        .hr{border:none;border-top:1px solid #eef2f7;margin:16px 0}
        .hint{font-size:12px;color:#667085}
        .field-err{margin-top:6px;color:#991b1b;font-size:13px;font-weight:700}
    </style>
</head>
<body>

<div class="wrap">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="card">
        <div class="top">
            <div>
                <div style="font-size:20px;font-weight:900;color:#0b1b4d">Комбо-наборы</div>
                <div class="muted">Создание и настройка комбо (еда + напиток и т.п.) с выгодной ценой.</div>
            </div>
            <a class="btn" th:href="@{/admin-buffet/combos}">Сбросить</a>
        </div>

        <div th:if="${ok}" class="ok" th:text="${ok}">OK</div>
        <div th:if="${err}" class="err" th:text="${err}">Ошибка</div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Комбо</th>
                <th>Цена</th>
                <th>Статус</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${combos}">
                <td th:text="${c.id}">1</td>
                <td>
                    <div style="font-weight:900;color:#0b1b4d" th:text="${c.name}">Комбо</div>
                    <div class="muted">
                        Слотов: <span th:text="${c.slots != null ? c.slots.size() : 0}">0</span>
                    </div>
                </td>
                <td th:text="${c.basePrice}">199.00</td>
                <td>
                    <span class="chip" th:classappend="${c.isActive} ? '' : ' off'"
                          th:text="${c.isActive} ? 'активно' : 'выключено'">активно</span>
                </td>
                <td>
                    <div class="row-actions">
                        <a class="btn" th:href="@{/admin-buffet/combos(edit=${c.id})}">Изменить</a>
                        <a class="btn" th:href="@{/admin-buffet/combos/{id}(id=${c.id})}">Состав</a>

                        <form th:action="@{/admin-buffet/combos/deactivate}" method="post" style="margin:0"
                              th:if="${c.isActive}">
                            <input type="hidden" name="id" th:value="${c.id}">
                            <button class="btn danger" type="submit"
                                    onclick="return confirm('Отключить комбо?')">Отключить</button>
                        </form>

                        <form th:action="@{/admin-buffet/combos/delete}" method="post" style="margin:0">
                            <input type="hidden" name="id" th:value="${c.id}">
                            <button class="btn danger" type="submit"
                                    onclick="return confirm('Удалить комбо полностью?')">Удалить</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <hr class="hr">

        <div>
            <div style="display:flex;gap:12px;align-items:baseline;justify-content:space-between;margin-bottom:10px">
                <div style="font-weight:900;color:#0b1b4d">
                    <span th:text="${editId != null ? 'Редактирование комбо' : 'Создание комбо'}">Создание комбо</span>
                </div>
                <div class="muted" th:if="${editId != null}">
                    ID: <span th:text="${editId}">1</span>
                </div>
            </div>

            <form th:action="@{/admin-buffet/combos/save}" method="post" th:object="${form}">
                <input type="hidden" th:field="*{id}"/>

                <div th:if="${#fields.hasGlobalErrors()}" class="err">
                    <div th:each="e : ${#fields.globalErrors()}" th:text="${e}">Ошибка</div>
                </div>

                <div class="grid">
                    <div>
                        <label>Название</label>
                        <input type="text" th:field="*{name}" placeholder="Например: Бургер + Кола">
                        <div class="field-err" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Ошибка</div>
                    </div>

                    <div>
                        <label>Цена комбо</label>
                        <input type="text" th:field="*{basePrice}" placeholder="например 199.00">
                        <div class="field-err" th:if="${#fields.hasErrors('basePrice')}" th:errors="*{basePrice}">Ошибка</div>
                        <div class="hint">Это “выгодная” цена по сравнению с суммой товаров по отдельности.</div>
                    </div>

                    <div>
                        <label>Статус</label>
                        <select th:field="*{isActive}">
                            <option th:value="true">активно</option>
                            <option th:value="false">выключено</option>
                        </select>
                        <div class="field-err" th:if="${#fields.hasErrors('isActive')}" th:errors="*{isActive}">Ошибка</div>
                    </div>

                    <div></div>
                </div>

                <div class="actions">
                    <button class="btn" type="submit">Сохранить</button>
                    <a class="btn" th:href="@{/admin-buffet/combos}">Отмена</a>
                </div>
            </form>
        </div>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

</body>
</html>
