<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${mode == 'edit' ? 'Редактирование товара' : 'Новый товар'}">Товар</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container">

    <div class="page-head">
        <h1 th:text="${mode == 'edit' ? 'Редактирование товара' : 'Добавление товара'}"></h1>
        <div class="actions">
            <a class="btn btn-light" th:href="@{/admin_buffet/products}">← Назад</a>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- ВАЖНО: multipart -->
    <form class="card form"
          method="post"
          enctype="multipart/form-data"
          th:action="${mode == 'edit'} ? @{/admin_buffet/products/{id}(id=${productId})} : @{/admin_buffet/products}"
          th:object="${dto}">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- category -->
        <div class="field">
            <label class="label">Категория</label>
            <select class="input" th:field="*{categoryId}">
                <option value="" disabled th:selected="${dto.categoryId == null}">Выберите категорию</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}">
                </option>
            </select>
            <div class="field-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
        </div>

        <!-- name -->
        <div class="field">
            <label class="label">Название</label>
            <input class="input" type="text" th:field="*{name}" maxlength="200" placeholder="Например: Бургер"/>
            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <!-- description -->
        <div class="field">
            <label class="label">Описание</label>
            <textarea class="input" th:field="*{description}" rows="4" maxlength="1000"
                      placeholder="Необязательно"></textarea>
            <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <!-- price -->
        <div class="field">
            <label class="label">Цена</label>
            <input class="input" type="number" step="0.01" min="0" th:field="*{basePrice}" placeholder="0.00"/>
            <div class="field-error" th:if="${#fields.hasErrors('basePrice')}" th:errors="*{basePrice}"></div>
        </div>

        <!-- active -->
        <div class="field">
            <label class="label">Активен</label>
            <label style="display:flex; gap:10px; align-items:center;">
                <input type="checkbox" th:field="*{active}"/>
                <span class="muted">Показывать покупателям</span>
            </label>
        </div>

        <!-- image -->
        <div class="field">
            <label class="label">Фото (необязательно)</label>

            <div th:if="${mode == 'edit' and hasImage}" class="muted" style="margin-bottom:8px;">
                Сейчас загружено фото.
                <a th:href="@{/admin_buffet/products/{id}/image(id=${productId})}" target="_blank">Посмотреть</a>
                <div class="muted">Чтобы заменить — выбери новый файл ниже.</div>
            </div>

            <input class="input" type="file" th:field="*{image}" accept="image/*"/>
        </div>

        <div class="btn-row" style="margin-top:16px;">
            <button class="btn btn-primary" type="submit"
                    th:text="${mode == 'edit' ? 'Сохранить' : 'Создать'}"></button>

            <a class="btn btn-light" th:href="@{/admin_buffet/products}">Отмена</a>
        </div>

    </form>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
