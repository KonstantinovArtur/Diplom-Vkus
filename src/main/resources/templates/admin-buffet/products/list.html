<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Товары</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container">

    <div class="page-head">
        <h1>Товары</h1>
        <div class="actions">
            <a class="btn btn-primary" th:href="@{/admin_buffet/products/new}">+ Добавить товар</a>
        </div>
    </div>

    <!-- flash messages -->
    <div th:if="${success != null}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

    <!-- filters -->
    <form class="card filters" method="get" th:action="@{/admin_buffet/products}">
        <div class="row">

            <div class="col">
                <label class="label">Категория</label>
                <select class="input" name="categoryId">
                    <option value="" th:selected="${categoryId == null}">Все категории</option>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:selected="${categoryId != null and c.id == categoryId}"
                            th:text="${c.name}">
                    </option>
                </select>
            </div>

            <div class="col">
                <label class="label">Поиск по названию</label>
                <input class="input"
                       type="text"
                       name="q"
                       th:value="${q != null ? q : ''}"
                       placeholder="например: бургер"/>
            </div>

            <div class="col col-actions">
                <label class="label">&nbsp;</label>
                <div class="btn-row">
                    <button class="btn btn-secondary" type="submit">Применить</button>
                    <a class="btn btn-light" th:href="@{/admin_buffet/products}">Сбросить</a>
                </div>
            </div>

        </div>
    </form>

    <!-- table -->
    <div class="card">
        <div class="table-wrap">
            <table class="table">
                <thead>
                <tr>
                    <th>Категория</th>
                    <th>Название</th>
                    <th style="width:140px;">Цена</th>
                    <th style="width:120px;">Активен</th>
                    <th style="width:200px;">Действия</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${items == null or #lists.isEmpty(items)}">
                    <td colspan="5" class="muted">Пока нет товаров.</td>
                </tr>

                <tr th:each="p : ${items}">
                    <!-- если items это List<Product> -->
                    <td>
                        <div class="muted" th:text="${p.category != null and p.category.parent != null ? p.category.parent.name : ''}"></div>
                        <div th:text="${p.category != null ? p.category.name : ''}"></div>
                    </td>

                    <td>
                        <div class="title" th:text="${p.name}"></div>
                        <div class="muted" th:if="${p.description != null and !#strings.isEmpty(p.description)}"
                             th:text="${p.description}"></div>
                    </td>

                    <td th:text="${#numbers.formatDecimal(p.basePrice, 1, 'COMMA', 2, 'POINT')} + ' ₽'"></td>

                    <td>
                        <span th:if="${p.isActive}" class="badge badge-green">Да</span>
                        <span th:if="${!p.isActive}" class="badge badge-gray">Нет</span>
                    </td>

                    <td>
                        <div class="btn-row">
                            <a class="btn btn-small"
                               th:href="@{/admin_buffet/products/{id}/edit(id=${p.id})}">Редактировать</a>
                        </div>
                    </td>
                </tr>

                <!-- ВАЖНО:
                     Если у тебя items это List<InventoryItem>, то этот блок надо заменить на ii.product.
                     (см. ниже) -->

                </tbody>
            </table>
        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
