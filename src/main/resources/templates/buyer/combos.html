<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Комбо</title>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main style="max-width:1100px;margin:18px auto;padding:0 12px;">
    <h2 style="margin:0 0 12px 0;">Комбо-наборы</h2>

    <section style="background:#fff;border:1px solid #e6e9ef;border-radius:16px;padding:14px;box-shadow:0 8px 24px rgba(10, 20, 60, 0.06);">

        <div th:if="${msg}"
             style="margin:0 0 14px 0;padding:10px 12px;border:1px solid #bbf7d0;border-radius:12px;background:#f0fdf4;color:#166534;font-weight:800;"
             th:text="${msg}">
            Сообщение
        </div>

        <div th:if="${err}"
             style="margin:0 0 14px 0;padding:10px 12px;border:1px solid #fecaca;border-radius:12px;background:#fef2f2;color:#991b1b;font-weight:800;"
             th:text="${err}">
            Ошибка
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px;">
            <div style="color:#6b7280;font-weight:800;">
                Готовые наборы товаров для быстрого заказа
            </div>

            <div style="color:#6b7280;font-weight:800;">
                Найдено: <span th:text="${#lists.size(combos)}">0</span>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(combos)}"
             style="padding:18px;border:1px dashed #d8deea;border-radius:14px;color:#6b7280;font-weight:800;text-align:center;background:#f8fafc;">
            Комбо пока нет.
        </div>

        <div th:if="${!#lists.isEmpty(combos)}"
             style="display:grid;grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));gap:12px;">

            <article th:each="c : ${combos}"
                     style="border:1px solid #e6e9ef;border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(10, 20, 60, 0.04);background:#fff;display:flex;flex-direction:column;">

                <div style="height:150px;border-bottom:1px solid #e6e9ef;overflow:hidden;">
                    <img th:if="${c.imageData != null}"
                         th:src="@{/combos/{id}/image(id=${c.id})}"
                         alt="combo"
                         style="width:100%;height:100%;object-fit:cover;display:block;">

                    <div th:unless="${c.imageData != null}"
                         style="height:100%;background:linear-gradient(135deg,#eef2ff 0%,#f8fafc 100%);display:flex;align-items:center;justify-content:center;">
                        <div style="text-align:center;padding:16px;">
                            <div style="font-size:18px;font-weight:900;color:#0b1b4d;">Комбо</div>
                            <div style="margin-top:6px;color:#64748b;font-weight:800;">Готовый набор</div>
                        </div>
                    </div>
                </div>

                <div style="padding:12px;display:flex;flex-direction:column;gap:10px;flex:1;">
                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                        <div style="font-weight:900;color:#0b1b4d;font-size:18px;line-height:1.2;"
                             th:text="${c.name}">
                            Комбо
                        </div>

                        <span style="white-space:nowrap;display:inline-block;font-weight:900;color:#0b1b4d;background:#eef2ff;border:1px solid #d8deea;padding:6px 10px;border-radius:999px;">
                            Набор
                        </span>
                    </div>

                    <div style="color:#64748b;font-weight:800;font-size:14px;min-height:42px;">
                        Выберите состав набора и добавьте его в корзину одной кнопкой.
                    </div>

                    <div style="margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap;">
                        <div>
                            <div style="color:#6b7280;font-weight:800;font-size:13px;">Базовая цена</div>
                            <div style="font-weight:900;color:#0b1b4d;font-size:20px;"
                                 th:text="${#numbers.formatDecimal(c.basePrice, 1, 'COMMA', 2, 'POINT')} + ' ₽'">
                                0,00 ₽
                            </div>
                        </div>

                        <a th:href="@{/combos/{id}(id=${c.id})}"
                           style="display:inline-block;padding:10px 12px;border-radius:12px;border:0;text-decoration:none;font-weight:900;color:#fff;background:#1d3b8b;">
                            Выбрать
                        </a>
                    </div>
                </div>
            </article>

        </div>

    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
