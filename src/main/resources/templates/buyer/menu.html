<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Меню</title>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<main style="max-width:1100px;margin:18px auto;padding:0 12px;">
    <h2 style="margin:0 0 12px 0;">Меню</h2>

    <section style="background:#fff;border:1px solid #e6e9ef;border-radius:16px;padding:14px;box-shadow:0 8px 24px rgba(10, 20, 60, 0.06);">

        <!-- фильтры -->
        <form method="get" th:action="@{/menu}"
              style="display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px;">

            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <select name="categoryId"
                        style="padding:10px 12px;border:1px solid #d8deea;border-radius:12px;background:#fff;font-weight:800;color:#0b1b4d;">
                    <option value="" th:selected="${categoryId == null}">Все категории</option>

                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:selected="${categoryId != null and c.id == categoryId}"
                            th:text="${c.name}">
                        Категория
                    </option>
                </select>

                <input name="q" th:value="${q}"
                       placeholder="Поиск по названию..."
                       style="padding:10px 12px;border:1px solid #d8deea;border-radius:12px;min-width:260px;"/>

                <button type="submit"
                        style="border:0;background:#1d3b8b;color:#fff;padding:10px 12px;border-radius:12px;font-weight:900;cursor:pointer;">
                    Найти
                </button>

                <a th:href="@{/menu}"
                   style="display:inline-block;padding:10px 12px;border-radius:12px;border:1px solid #d8deea;text-decoration:none;font-weight:900;color:#0b1b4d;">
                    Сброс
                </a>
            </div>

            <div style="color:#6b7280;font-weight:800;">
                Найдено: <span th:text="${#lists.size(items)}">0</span>
            </div>
        </form>

        <!-- карточки -->
        <div th:if="${#lists.isEmpty(items)}" style="padding:10px 0;color:#6b7280;">
            Ничего не найдено.
        </div>

        <div th:if="${!#lists.isEmpty(items)}"
             style="display:grid;grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));gap:12px;">

            <article th:each="it : ${items}"
                     style="border:1px solid #e6e9ef;border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(10, 20, 60, 0.04);background:#fff;">

                <!-- картинка -->
                <div style="height:150px;background:#f4f6fb;display:flex;align-items:center;justify-content:center;">
                    <img th:if="${it.hasImage()}"
                         th:src="@{/products/{id}/image(id=${it.productId()})}"
                         alt="img"
                         style="width:100%;height:150px;object-fit:cover;" />

                    <div th:if="${!it.hasImage()}"
                         style="color:#9aa3b2;font-weight:900;">
                        Нет изображения
                    </div>
                </div>

                <div style="padding:12px;">

                    <!-- Заголовок + бейджи -->
                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                        <div style="font-weight:900;color:#0b1b4d;font-size:16px;line-height:1.2;flex:1;min-width:0;"
                             th:text="${it.name()}">Название</div>

                        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:60%;flex:0 0 auto;">

                            <!-- Уценка: процент + остаток -->
                            <span th:with="info=${expiryInfoByProductId[it.productId()]}"
                                  th:if="${info != null and info.qty() > 0}"
                                  style="
                      display:inline-flex;
                      align-items:center;
                      max-width:100%;
                      font-weight:900;
                      color:#0b1b4d;
                      background:#fff7ed;
                      border:1px solid #d8deea;
                      padding:6px 10px;
                      border-radius:999px;
                      white-space:normal;
                      line-height:1.15;
                      word-break:break-word;
                      overflow-wrap:anywhere;
                    "
                                  th:text="'Бонус ' + ${#numbers.formatDecimal(info.percent(), 1, 'COMMA', 0, 'POINT')} + '% · ' + ${info.qty()} + ' шт'">
                Бонус 0% · 0 шт
              </span>

                            <!-- Акция -->
                            <span th:if="${it.promoPercent() != null}"
                                  style="white-space:nowrap;display:inline-block;font-weight:900;color:#0b1b4d;background:#eef2ff;border:1px solid #d8deea;padding:6px 10px;border-radius:999px;">
                <span th:text="${it.promoText()}">Акция</span>
              </span>

                            <!-- Уценка партии -->
                            <span th:if="${it.batchPercent() != null}"
                                  style="white-space:nowrap;display:inline-block;font-weight:900;color:#0b1b4d;background:#fff7ed;border:1px solid #d8deea;padding:6px 10px;border-radius:999px;">
                <span th:text="${it.batchText()}">Бонус 10%</span>
              </span>

                            <!-- Скидка месяца -->
                            <span th:if="${it.monthlyPercent() != null}"
                                  style="white-space:nowrap;display:inline-block;font-weight:900;color:#0b1b4d;background:#ecfeff;border:1px solid #d8deea;padding:6px 10px;border-radius:999px;">
                <span th:text="${it.monthlyText()}">Скидка месяца</span>
              </span>

                            <!-- Остаток на складе (бейджи) -->
                            <span th:if="${stockQtyByProductId[it.productId()] != null and stockQtyByProductId[it.productId()] == 0}"
                                  style="white-space:nowrap;display:inline-block;font-weight:900;color:#b91c1c;background:#fff;border:1px solid #f1c0c0;padding:6px 10px;border-radius:999px;">
                Нет в наличии
              </span>

                            <span th:if="${stockQtyByProductId[it.productId()] != null and stockQtyByProductId[it.productId()] > 0}"
                                  style="white-space:nowrap;display:inline-block;font-weight:900;color:#0b1b4d;background:#f8fafc;border:1px solid #d8deea;padding:6px 10px;border-radius:999px;"
                                  th:text="'В наличии: ' + ${stockQtyByProductId[it.productId()]} + ' шт'">
                В наличии: 0 шт
              </span>

                        </div>
                    </div>

                    <!-- категория -->
                    <div style="margin-top:6px;color:#6b7280;font-weight:800;font-size:13px;"
                         th:text="${it.categoryName()}">Категория</div>

                    <!-- описание -->
                    <div th:if="${it.description() != null and !#strings.isEmpty(it.description())}"
                         style="margin-top:8px;color:#334155;font-weight:700;font-size:13px;min-height:34px;"
                         th:text="${it.description()}">
                        Описание
                    </div>
                    <div th:if="${it.description() == null or #strings.isEmpty(it.description())}"
                         style="margin-top:8px;color:#94a3b8;font-weight:700;font-size:13px;min-height:34px;">
                        &nbsp;
                    </div>

                    <!-- цена + кнопка -->
                    <div style="margin-top:10px;display:flex;align-items:flex-end;justify-content:space-between;">
                        <div>
                            <!-- ✅ если НЕТ ни одной скидки (promo/monthly/batch) -->
                            <div th:if="${it.promoPercent() == null and it.monthlyPercent() == null and it.batchPercent() == null}"
                                 style="font-weight:900;color:#0b1b4d;font-size:18px;"
                                 th:text="${#numbers.formatDecimal(it.basePrice(), 1, 'COMMA', 2, 'POINT')}">
                                0.00
                            </div>

                            <!-- ✅ если ЕСТЬ хотя бы одна скидка -->
                            <div th:if="${it.promoPercent() != null or it.monthlyPercent() != null or it.batchPercent() != null}">
                                <div style="text-decoration:line-through;color:#6b7280;font-weight:800;font-size:13px;"
                                     th:text="${#numbers.formatDecimal(it.basePrice(), 1, 'COMMA', 2, 'POINT')}">
                                    0.00
                                </div>
                                <div style="font-weight:900;color:#0b1b4d;font-size:18px;margin-top:2px;"
                                     th:text="${#numbers.formatDecimal(it.finalPrice(), 1, 'COMMA', 2, 'POINT')}">
                                    0.00
                                </div>
                            </div>

                            <!-- ✅ кнопка: отключаем если нет в наличии -->
                            <!-- остаток -->
                            <div style="margin-top:10px;font-weight:800;font-size:13px;color:#64748b;">
  <span th:with="qtyOnStock=${stockQtyByProductId[it.productId()] ?: 0}">
    <span th:if="${qtyOnStock == 0}"
          style="color:#b91c1c;font-weight:900;">
      Нет в наличии
    </span>

    <span th:if="${qtyOnStock > 0}"
          th:text="'В наличии: ' + ${qtyOnStock} + ' шт'">
      На складе: 0 шт
    </span>
  </span>
                            </div>

                            <form th:action="@{/cart/add}" method="post" style="margin-top:10px;"
                                  th:with="qtyOnStock=${stockQtyByProductId[it.productId()] ?: 0}">
                                <input type="hidden" name="productId" th:value="${it.productId()}"/>
                                <input type="hidden" name="qty" value="1"/>

                                <div style="margin-top:10px;"
                                     th:with="qtyOnStock=${stockQtyByProductId[it.productId()] ?: 0}">

                                    <button type="button"
                                            th:disabled="${qtyOnStock == 0}"
                                            th:attr="onclick=|addToCartAndShowRecommendations(${it.productId()})|"
                                            th:style="${qtyOnStock == 0}
             ? 'border:0;background:#cbd5e1;color:#64748b;padding:10px 12px;border-radius:12px;font-weight:900;cursor:not-allowed;'
             : 'border:0;background:#1d3b8b;color:#fff;padding:10px 12px;border-radius:12px;font-weight:900;cursor:pointer;'">
                                        В корзину
                                    </button>
                                </div>
                            </form>

                        </div>
                    </div>

                </div>
            </article>

        </div>

    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
<div id="recModal" style="display:none;position:fixed;inset:0;z-index:3000;">
    <div onclick="closeRecModal()"
         style="position:absolute;inset:0;background:rgba(15,23,42,.45);"></div>

    <div style="position:relative;max-width:820px;margin:70px auto;background:#fff;border-radius:20px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.22);">
        <button type="button"
                onclick="closeRecModal()"
                style="position:absolute;right:14px;top:10px;border:none;background:none;font-size:28px;cursor:pointer;color:#334155;">
            ×
        </button>

        <div style="font-size:24px;font-weight:900;color:#0b1b4d;margin-bottom:4px;">
            К этому товару обычно берут
        </div>

        <div style="color:#64748b;margin-bottom:16px;">
            Вы можете сразу добавить рекомендованные товары в корзину
        </div>

        <div id="recList"
             style="display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:12px;">
        </div>
    </div>
</div>
<script>
    async function addToCartAndShowRecommendations(productId) {
        try {
            const resp = await fetch('/cart/add-ajax', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
                },
                body: new URLSearchParams({
                    productId: productId,
                    qty: 1
                })
            });

            const data = await resp.json();

            if (!data.ok) {
                alert(data.message || 'Не удалось добавить товар в корзину');
                return;
            }

            await loadRecommendations(productId);

        } catch (e) {
            console.error(e);
            alert('Ошибка при добавлении товара в корзину');
        }
    }

    async function loadRecommendations(productId) {
        try {
            const resp = await fetch('/buyer/recommendations/' + productId, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (!resp.ok) return;

            const items = await resp.json();
            if (!items || items.length === 0) return;

            const recList = document.getElementById('recList');
            recList.innerHTML = '';

            for (const item of items) {
                const html = `
                <div style="border:1px solid #e6e9ef;border-radius:16px;padding:12px;background:#fff;">
                    ${
                    item.hasImage
                        ? `<img src="/products/${item.productId}/image"
                                alt=""
                                style="width:100%;height:140px;object-fit:cover;border-radius:12px;background:#f4f6fb;margin-bottom:10px;">`
                        : `<div style="height:140px;border-radius:12px;background:#f4f6fb;display:flex;align-items:center;justify-content:center;color:#9aa3b2;font-weight:900;margin-bottom:10px;">Нет изображения</div>`
                }

                    <div style="font-weight:900;color:#0b1b4d;margin-bottom:4px;">
                        ${escapeHtml(item.name || '')}
                    </div>

                    <div style="font-size:13px;color:#6b7280;font-weight:800;margin-bottom:6px;">
                        ${escapeHtml(item.categoryName || '—')}
                    </div>

                    <div style="font-size:13px;color:#334155;min-height:34px;margin-bottom:8px;">
                        ${escapeHtml(item.description || '')}
                    </div>

                    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
                        ${item.promoText ? badgeHtml('#eef2ff', item.promoText) : ''}
                        ${item.batchText ? badgeHtml('#fff7ed', item.batchText) : ''}
                        ${item.monthlyText ? badgeHtml('#ecfeff', item.monthlyText) : ''}
                    </div>

                    ${
                    hasAnyDiscount(item)
                        ? `
                            <div style="text-decoration:line-through;color:#6b7280;font-weight:800;font-size:13px;">
                                ${formatPrice(item.basePrice)}
                            </div>
                            <div style="font-weight:900;color:#0b1b4d;font-size:18px;margin-bottom:10px;">
                                ${formatPrice(item.finalPrice)}
                            </div>
                          `
                        : `
                            <div style="font-weight:900;color:#0b1b4d;font-size:18px;margin-bottom:10px;">
                                ${formatPrice(item.basePrice)}
                            </div>
                          `
                }

                    <button type="button"
                            onclick="addRecommendedToCart(this, ${item.productId})"
                            style="width:100%;border:0;background:#1d3b8b;color:#fff;padding:10px 12px;border-radius:12px;font-weight:900;cursor:pointer;">
                        Добавить
                    </button>
                </div>
            `;

                recList.insertAdjacentHTML('beforeend', html);
            }

            openRecModal();

        } catch (e) {
            console.error(e);
        }
    }

    async function addRecommendedToCart(btn, productId) {
        try {
            btn.disabled = true;

            const resp = await fetch('/cart/add-ajax', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
                },
                body: new URLSearchParams({
                    productId: productId,
                    qty: 1
                })
            });

            const data = await resp.json();

            if (!data.ok) {
                btn.disabled = false;
                alert(data.message || 'Не удалось добавить товар');
                return;
            }

            btn.textContent = 'Добавлено';
            btn.style.background = '#16a34a';

        } catch (e) {
            console.error(e);
            btn.disabled = false;
            alert('Ошибка при добавлении рекомендованного товара');
        }
    }

    function openRecModal() {
        document.getElementById('recModal').style.display = 'block';
    }

    function closeRecModal() {
        document.getElementById('recModal').style.display = 'none';
        document.getElementById('recList').innerHTML = '';
    }

    function formatPrice(v) {
        if (v == null) return '';
        const n = Number(v);
        return n.toFixed(2).replace('.', ',') + ' ₽';
    }

    function hasAnyDiscount(item) {
        return item.promoPercent != null || item.batchPercent != null || item.monthlyPercent != null;
    }

    function badgeHtml(bg, text) {
        return `<span style="white-space:nowrap;display:inline-block;font-weight:900;color:#0b1b4d;background:${bg};border:1px solid #d8deea;padding:6px 10px;border-radius:999px;">${escapeHtml(text)}</span>`;
    }

    function escapeHtml(str) {
        return String(str)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }
</script>
</body>
</html>
