<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Оформление заказа</title>
    <link rel="stylesheet" th:href="@{/css/vkus/vkus.css}">
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<main class="vk-page vk-page-narrow">
    <section class="vk-hero">
        <h1>Оформление заказа</h1>
        <p>Подтвердите заказ. После подтверждения товары сразу спишутся со склада.</p>
    </section>

    <section class="vk-card vk-card-pad" style="margin-top:18px;">
        <div class="vk-alert vk-alert-warning">
            Товары будут <b>сразу списаны со склада</b>. Перед подтверждением проверьте корзину.
        </div>

        <form th:action="@{/orders/checkout}" method="post" class="vk-actions">
            <input type="hidden" name="checkoutBuffetId" th:value="${checkoutBuffetId}"/>

            <button class="vk-btn" type="submit">
                Подтвердить заказ
            </button>

            <a class="vk-btn vk-btn-secondary" th:href="@{/cart}">
                Вернуться в корзину
            </a>
        </form>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
