<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Мои заказы</title>
    <link rel="stylesheet" th:href="@{/css/vkus/vkus.css}">
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<main class="vk-page">
    <section class="vk-hero">
        <h1>Мои заказы</h1>
        <p>Следите за статусом заказа, открывайте чек и повторяйте удачные покупки.</p>
    </section>

    <section class="vk-card vk-card-pad" style="margin-top:18px;">
        <div th:if="${#lists.isEmpty(orders)}" class="vk-empty">
            Заказов пока нет.
        </div>

        <div th:if="${!#lists.isEmpty(orders)}" class="order-list">
            <div th:each="o : ${orders}" class="order-card">
                <div class="order-info">
                    <div class="order-number">
                        Заказ #<span th:text="${o.id}">0</span>
                    </div>

                    <div class="order-date" th:text="${o.createdAtMsk}">—</div>

                    <span class="vk-badge"
                          th:classappend="' status-' + ${o.status}"
                          th:switch="${o.status}">
                        <span th:case="'created'">Создан</span>
                        <span th:case="'accepted'">Принят</span>
                        <span th:case="'assembling'">В сборке</span>
                        <span th:case="'ready'">Готов к выдаче</span>
                        <span th:case="'issued'">Выдан</span>
                        <span th:case="'cancelled'">Отменён</span>
                        <span th:case="*">—</span>
                    </span>

                    <div class="price price-small"
                         th:text="${#numbers.formatDecimal(o.finalAmount, 1, 'COMMA', 2, 'POINT')} + ' ₽'">
                        0.00 ₽
                    </div>
                </div>

                <div class="vk-actions">
                    <a class="vk-btn vk-btn-secondary"
                       th:href="@{/orders/{id}(id=${o.id})}">
                        Открыть
                    </a>

                    <a class="vk-btn vk-btn-success"
                       th:href="@{/orders/{id}/receipt(id=${o.id})}">
                        Чек
                    </a>

                    <form th:action="@{/buyer/orders/{id}/repeat(id=${o.id})}" method="post">
                        <button class="vk-btn vk-btn-accent" type="submit">
                            Повторить
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
