<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Логи действий</title>
    <style>
        .wrap{max-width:1100px;margin:24px auto;font-family:system-ui,Segoe UI,Arial}
        .card{background:#fff;border:1px solid #e6e9ef;border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(10,20,60,06)}
        .top{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px}
        table{width:100%;border-collapse:separate;border-spacing:0 8px}
        th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;text-align:left;color:#425}
        td{background:#fff;border:1px solid #e6e9ef;padding:10px 12px;vertical-align:top}
        tr td:first-child{border-radius:12px 0 0 12px}
        tr td:last-child{border-radius:0 12px 12px 0}
        .btn{display:inline-block;padding:8px 12px;border-radius:10px;border:1px solid #d8deea;text-decoration:none;color:#0b1b4d;font-weight:700;background:#fff;cursor:pointer}
        .btn:hover{border-color:#0b1b4d}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        label{display:block;font-size:12px;font-weight:800;color:#0b1b4d;margin-bottom:6px}
        input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #d8deea;font:inherit}
        .muted{color:#667085;font-size:13px}
        .actions{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
        .chip{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid #e6e9ef;background:#fff;color:#0b1b4d;font-weight:800;font-size:12px}
        .hr{border:none;border-top:1px solid #eef2f7;margin:16px 0}
        pre{margin:0;white-space:pre-wrap;word-break:break-word;font-size:12px;color:#0b1b4d}
    </style>
</head>
<body>

<div class="wrap">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="card">
        <div class="top">
            <div>
                <div style="font-size:20px;font-weight:900;color:#0b1b4d">Логи действий</div>
                <div class="muted">История операций (таблица audit_log).</div>
            </div>
            <a class="btn" th:href="@{/admin-db/audit}">Сбросить</a>
        </div>

        <form method="get" th:action="@{/admin-db/audit}">
            <div class="grid">
                <div>
                    <label>Action</label>
                    <input type="text" name="action" th:value="${action}" placeholder="например: DB_BACKUP">
                </div>
                <div>
                    <label>Entity type</label>
                    <input type="text" name="entityType" th:value="${entityType}" placeholder="например: backup">
                </div>
                <div>
                    <label>ФИО пользователя</label>
                    <input type="text"
                           name="actorName"
                           th:value="${actorName}"
                           placeholder="например: Иванов">
                </div>
                <div>
                    <label>Период</label>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                        <input type="datetime-local" name="from" th:value="${from}">
                        <input type="datetime-local" name="to" th:value="${to}">
                    </div>
                </div>
            </div>
            <div class="actions">
                <button class="btn" type="submit">Фильтровать</button>
            </div>
        </form>

        <hr class="hr">

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Время</th>
                <th>Actor</th>
                <th>Action</th>
                <th>Entity</th>
                <th>Meta</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="l : ${logs}">
                <td th:text="${l.id}">1</td>
                <td th:text="${l.createdAt}">2026-02-25T12:00</td>
                <td>
    <span class="chip"
          th:text="${l.actor != null ? l.actor.fullName : 'Система'}">
        —
    </span>
                </td>                <td><div style="font-weight:900;color:#0b1b4d" th:text="${l.action}">ACTION</div></td>
                <td class="muted">
                    <span th:text="${l.entityType != null ? l.entityType : '—'}">—</span>
                    <span th:text="${l.entityId != null ? (' #' + l.entityId) : ''}"></span>
                </td>
                <td><pre th:text="${l.metaJson != null ? l.metaJson : '—'}">—</pre></td>
            </tr>

            <tr th:if="${#lists.isEmpty(logs)}">
                <td colspan="6" class="muted" style="padding:14px 12px">Записей нет.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

</body>
</html>
