<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Пользователи</title>
  <style>
    .wrap{max-width:1100px;margin:24px auto;font-family:system-ui,Segoe UI,Arial}
    .card{background:#fff;border:1px solid #e6e9ef;border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(10,20,60,.06)}
    .top{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px}
    table{width:100%;border-collapse:separate;border-spacing:0 8px}
    th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;text-align:left;color:#425}
    td{background:#fff;border:1px solid #e6e9ef;padding:10px 12px}
    tr td:first-child{border-radius:12px 0 0 12px}
    tr td:last-child{border-radius:0 12px 12px 0}
    .btn{display:inline-block;padding:8px 12px;border-radius:10px;border:1px solid #d8deea;text-decoration:none;color:#0b1b4d;font-weight:700;background:#fff}
    .btn:hover{border-color:#0b1b4d}
    .ok{background:#ecfdf5;border:1px solid #a7f3d0;padding:10px 12px;border-radius:12px;margin:12px 0;color:#065f46;font-weight:700}
    .err{background:#fef2f2;border:1px solid #fecaca;padding:10px 12px;border-radius:12px;margin:12px 0;color:#991b1b;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:block;font-size:12px;font-weight:800;color:#0b1b4d;margin-bottom:6px}
    input,select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #d8deea}
    .muted{color:#667085;font-size:13px}
    .actions{display:flex;gap:10px;align-items:center;margin-top:10px}
  </style>
</head>
<body>

<div class="wrap">
  <div th:replace="fragments/header :: header"></div>

  <div class="card">
    <div class="top">
      <div>
        <div style="font-size:20px;font-weight:900;color:#0b1b4d">Пользователи</div>
        <div class="muted">Можно менять только роль пользователя</div>
      </div>
      <a class="btn" th:href="@{/admin-db/users}">Сбросить</a>
    </div>

    <div th:if="${ok}" class="ok" th:text="${ok}">OK</div>

    <!-- Таблица пользователей -->
    <table>
      <thead>
      <tr>
        <th>ID</th>
        <th>Создан</th>
        <th>Email</th>
        <th>ФИО</th>
        <th>Статус</th>
        <th>Роли</th>
        <th></th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="u : ${users}">
        <td th:text="${u.id}">1</td>
        <td th:text="${u.createdAt}">2026-01-01</td>
        <td th:text="${u.email}">mail</td>
        <td th:text="${u.fullName}">name</td>
        <td th:text="${u.status}">active</td>
        <td th:text="${u.roles}">buyer</td>

        <td>
          <a class="btn" th:href="@{/admin-db/users(edit=${u.id})}">Изменить роль</a>

          <form th:action="@{/admin-db/users/{id}/delete(id=${u.id})}" method="post" style="display:inline">
            <button class="btn" type="submit"
                    onclick="return confirm('Удалить пользователя? Это удалит его роли и привязки входа.')">
              Удалить
            </button>
          </form>
        </td>

      </tr>
      </tbody>
    </table>

    <hr style="border:none;border-top:1px solid #eef2f7;margin:16px 0">

    <!-- Форма смены роли -->
    <!-- Форма смены роли -->
    <div th:if="${editUserId != null}">
      <div style="font-weight:900;color:#0b1b4d;margin-bottom:10px">
        Изменение роли пользователя
      </div>

      <form th:action="@{/admin-db/users/save-role}" method="post" th:object="${form}">
        <input type="hidden" th:field="*{userId}"/>

        <!-- ✅ теперь #fields в правильном контексте -->
        <div th:if="${#fields.hasErrors('*')}" class="err">
          Проверьте форму — есть ошибки.
        </div>

        <div class="grid">
          ...
          <div style="grid-column:1 / -1">
            <label>Роль</label>
            <select th:field="*{roleId}">
              <option value="" disabled>-- выберите роль --</option>
              <option th:each="r : ${roles}" th:value="${r.id}"
                      th:text="${r.code + ' — ' + r.name}">
              </option>
            </select>

            <div class="muted" th:if="${#fields.hasErrors('roleId')}"
                 th:errors="*{roleId}">Ошибка</div>
          </div>
        </div>

        <div class="actions">
          <button class="btn" type="submit">Сохранить</button>
          <a class="btn" th:href="@{/admin-db/users}">Отмена</a>
        </div>
      </form>
    </div>
  </div>

  </div>

  <div th:replace="fragments/footer :: footer"></div>
</div>

</body>
</html>
