<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Роли</title>
    <style>
        .wrap { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
        .card { background:#fff; border:1px solid #e6e9ef; border-radius:16px; padding:16px; box-shadow:0 8px 24px rgba(10,20,60,.06); }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; align-items:start; }
        table { width:100%; border-collapse: collapse; }
        th, td { padding:10px 8px; border-bottom:1px solid #eef1f6; text-align:left; }
        th { font-weight:900; color:#0b1b4d; }
        .actions { display:flex; gap:8px; }
        .btn { display:inline-block; padding:8px 12px; border-radius:12px; border:1px solid #d8deea; background:#fff; font-weight:800; cursor:pointer; text-decoration:none; color:#0b1b4d; }
        .btn:hover { border-color:#0b1b4d; }
        .btn-primary { background:#1d3b8b; color:#fff; border-color:#1d3b8b; }
        .btn-danger { background:#fff; color:#b00020; border-color:#f0c8cf; }
        .msg-ok { margin:0 0 12px; padding:10px 12px; border-radius:12px; background:#ecfdf3; border:1px solid #b7f0c9; font-weight:800; }
        .msg-err { margin:0 0 12px; padding:10px 12px; border-radius:12px; background:#fff1f2; border:1px solid #fecdd3; font-weight:800; color:#b00020; }
        .field { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
        .field label { font-weight:800; color:#0b1b4d; }
        .field input { padding:10px 12px; border-radius:12px; border:1px solid #d8deea; outline:none; }
        .field input:focus { border-color:#0b1b4d; }
        .err { color:#b00020; font-weight:700; font-size:13px; }
        .muted { color:#6b7280; font-size:13px; margin-top:6px; }
        .top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; }
        .title { font-size:20px; font-weight:900; color:#0b1b4d; }
    </style>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="wrap">
    <div class="card">

        <div th:if="${ok}" class="msg-ok" th:text="${ok}">OK</div>
        <div th:if="${err}" class="msg-err" th:text="${err}">ERR</div>

        <div class="grid">

            <!-- Таблица -->
            <div>
                <div class="top">
                    <div class="title">Роли</div>
                    <a class="btn" th:href="@{/admin-db/roles}">Сбросить</a>
                </div>

                <table>
                    <thead>
                    <tr>
                        <th style="width:70px;">ID</th>
                        <th style="width:220px;">Код</th>
                        <th>Название</th>
                        <th style="width:220px;">Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${roles}">
                        <td th:text="${r.id}">1</td>
                        <td th:text="${r.code}">db_admin</td>
                        <td th:text="${r.name}">Администратор БД</td>
                        <td>
                            <div class="actions">
                                <a class="btn" th:href="@{/admin-db/roles(edit=${r.id})}">Изменить</a>
                                <form th:action="@{/admin-db/roles/{id}/delete(id=${r.id})}" method="post"
                                      onsubmit="return confirm('Удалить роль?');">
                                    <button class="btn btn-danger" type="submit">Удалить</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(roles)}">
                        <td colspan="4" class="muted">Ролей пока нет</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Форма -->
            <div>
                <div class="top">
                    <div class="title" th:text="${editId != null ? 'Редактирование роли' : 'Добавить роль'}">Форма</div>
                </div>

                <form th:action="@{/admin-db/roles/save}" method="post" th:object="${form}">
                    <input type="hidden" th:field="*{id}"/>

                    <div class="field">
                        <label>Код</label>
                        <input type="text" th:field="*{code}" placeholder="например: db_admin"/>
                        <div class="err" th:if="${#fields.hasErrors('code')}" th:errors="*{code}">error</div>
                        <div class="muted">Только латиница в нижнем регистре, цифры и подчёркивания.</div>
                    </div>

                    <div class="field">
                        <label>Название</label>
                        <input type="text" th:field="*{name}" placeholder="например: Администратор БД"/>
                        <div class="err" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">error</div>
                    </div>

                    <div class="actions">
                        <button class="btn btn-primary" type="submit"
                                th:text="${editId != null ? 'Сохранить' : 'Добавить'}">Сохранить</button>

                        <a class="btn" th:if="${editId != null}" th:href="@{/admin-db/roles}">Отмена</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
