<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Категории</title>
    <style>
        .wrap{max-width:1100px;margin:18px auto;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
        .card{background:#fff;border:1px solid #e6e9ef;border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(10,20,60,.06)}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;border-bottom:1px solid #eef1f6;text-align:left;vertical-align:top}
        th{font-size:12px;color:#4b5563;text-transform:uppercase;letter-spacing:.04em}
        .row{display:flex;gap:12px;flex-wrap:wrap}
        .row > div{flex:1;min-width:220px}
        input,select{width:100%;padding:10px 12px;border:1px solid #d8deea;border-radius:12px}
        .btn{padding:10px 14px;border-radius:12px;border:1px solid #d8deea;background:#fff;font-weight:800;cursor:pointer}
        .btn-primary{background:#1d3b8b;color:#fff;border-color:#1d3b8b}
        .btn-danger{border-color:#ef4444;color:#ef4444;background:#fff}
        .muted{color:#6b7280;font-size:12px}
        .ok{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;padding:10px 12px;border-radius:12px;margin-bottom:12px}
        .err{color:#b91c1c;font-size:12px;margin-top:6px}
        .chip{display:inline-block;padding:4px 10px;border-radius:999px;border:1px solid #d8deea;background:#eef2ff;font-size:12px;font-weight:700}
        .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
    </style>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="wrap">
    <div class="topbar">
        <h2 style="margin:0;">Категории товаров</h2>
        <a class="btn" th:href="@{/admin-db/categories}">Сбросить</a>
    </div>

    <div th:if="${ok}" class="ok" th:text="${ok}">OK</div>

    <div class="card" style="margin-bottom:14px;">
        <form th:action="@{/admin-db/categories/save}" method="post" th:object="${form}">
            <input type="hidden" th:field="*{id}"/>

            <div class="row">
                <div>
                    <label class="muted">Родительская категория</label>
                    <select th:field="*{parentId}">
                        <option th:value="${null}">— нет (верхний уровень) —</option>
                        <option th:each="p : ${parents}"
                                th:value="${p.id}"
                                th:text="${p.name}">
                        </option>
                    </select>
                    <div class="err" th:if="${#fields.hasErrors('parentId')}" th:errors="*{parentId}"></div>
                </div>

                <div>
                    <label class="muted">Название</label>
                    <input type="text" th:field="*{name}" placeholder="Например: Напитки"/>
                    <div class="err" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div style="flex:0.5;min-width:180px;">
                    <label class="muted">Активна</label>
                    <select th:field="*{isActive}">
                        <option th:value="true">Да</option>
                        <option th:value="false">Нет</option>
                    </select>
                </div>
            </div>

            <div style="margin-top:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <button class="btn btn-primary" type="submit"
                        th:text="${form.id == null ? 'Добавить' : 'Сохранить'}">Сохранить</button>

                <a class="btn" th:if="${form.id != null}" th:href="@{/admin-db/categories}">Отмена</a>

                <span class="muted" th:if="${form.id != null}">
                    Редактирование категории #<span th:text="${form.id}">0</span>
                </span>
            </div>
        </form>
    </div>

    <div class="card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Родитель</th>
                <th>Название</th>
                <th>Статус</th>
                <th style="width:240px;">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${categories}">
                <td th:text="${c.id}">1</td>
                <td th:text="${c.parent != null ? c.parent.name : '—'}">—</td>
                <td>
                    <div th:text="${c.name}">name</div>
                </td>
                <td>
                    <span class="chip" th:text="${c.isActive ? 'Активна' : 'Выключена'}">Активна</span>
                </td>
                <td>
                    <a class="btn" th:href="@{/admin-db/categories(edit=${c.id})}">Изменить</a>
                    <form th:action="@{/admin-db/categories/{id}/delete(id=${c.id})}" method="post" style="display:inline;">
                        <button class="btn btn-danger" type="submit"
                                onclick="return confirm('Удалить категорию?');">Удалить</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(categories)}">
                <td colspan="5" class="muted">Пока нет категорий</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
