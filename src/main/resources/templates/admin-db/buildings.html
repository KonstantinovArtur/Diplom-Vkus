<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Здания</title>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<main style="max-width:1100px;margin:18px auto;padding:0 12px;">
    <h2 style="margin:0 0 12px 0;">Админ БД · Здания</h2>

    <div th:if="${msg}" style="padding:10px 12px;border:1px solid #d8deea;border-radius:12px;background:#eef2ff;margin-bottom:12px;"
         th:text="${msg}">
        Сообщение
    </div>

    <div style="display:grid;grid-template-columns: 1.6fr 1fr;gap:14px;align-items:start;">
        <!-- Таблица -->
        <section style="background:#fff;border:1px solid #e6e9ef;border-radius:16px;padding:14px;box-shadow:0 8px 24px rgba(10, 20, 60, 0.06);">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;">
                <strong>Список зданий</strong>
                <a th:href="@{/admin-db/buildings}" style="text-decoration:none;border:1px solid #d8deea;padding:8px 10px;border-radius:12px;font-weight:800;color:#0b1b4d;">
                    + Добавить
                </a>
            </div>

            <table style="width:100%;border-collapse:collapse;">
                <thead>
                <tr style="text-align:left;border-bottom:1px solid #e6e9ef;">
                    <th style="padding:10px 8px;">ID</th>
                    <th style="padding:10px 8px;">Название</th>
                    <th style="padding:10px 8px;">Адрес</th>
                    <th style="padding:10px 8px;width:160px;">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${buildings}" style="border-bottom:1px solid #f0f2f7;">
                    <td style="padding:10px 8px;" th:text="${b.id}">1</td>
                    <td style="padding:10px 8px;font-weight:800;" th:text="${b.name}">Корпус А</td>
                    <td style="padding:10px 8px;" th:text="${b.address}">Адрес</td>
                    <td style="padding:10px 8px;display:flex;gap:8px;align-items:center;">
                        <a th:href="@{/admin-db/buildings(editId=${b.id})}"
                           style="text-decoration:none;border:1px solid #d8deea;padding:8px 10px;border-radius:12px;font-weight:800;color:#0b1b4d;">
                            Изменить
                        </a>

                        <form th:action="@{/admin-db/buildings/{id}/delete(id=${b.id})}" method="post"
                              onsubmit="return confirm('Удалить здание?');">
                            <button type="submit"
                                    style="border:1px solid #f2c6c6;background:#fff;color:#7a0b0b;padding:8px 10px;border-radius:12px;font-weight:900;cursor:pointer;">
                                Удалить
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(buildings)}">
                    <td colspan="4" style="padding:12px 8px;color:#6b7280;">
                        Пока нет зданий.
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

        <!-- Форма -->
        <section style="background:#fff;border:1px solid #e6e9ef;border-radius:16px;padding:14px;box-shadow:0 8px 24px rgba(10, 20, 60, 0.06);">
            <strong th:text="${editing} ? 'Редактирование' : 'Добавление'">Добавление</strong>

            <form th:action="@{/admin-db/buildings/save}" method="post" th:object="${buildingForm}"
                  style="margin-top:10px;display:grid;gap:10px;">
                <input type="hidden" th:field="*{id}" />

                <label style="display:grid;gap:6px;">
                    <span style="font-weight:800;">Название</span>
                    <input th:field="*{name}" placeholder="Например: Корпус А"
                           style="padding:10px 12px;border:1px solid #d8deea;border-radius:12px;" />
                    <small th:if="${#fields.hasErrors('name')}"
                           th:errors="*{name}" style="color:#b42318;font-weight:700;"></small>
                </label>

                <label style="display:grid;gap:6px;">
                    <span style="font-weight:800;">Адрес</span>
                    <input th:field="*{address}" placeholder="Можно оставить пустым"
                           style="padding:10px 12px;border:1px solid #d8deea;border-radius:12px;" />
                    <small th:if="${#fields.hasErrors('address')}"
                           th:errors="*{address}" style="color:#b42318;font-weight:700;"></small>
                </label>

                <button type="submit"
                        style="border:0;background:#1d3b8b;color:#fff;padding:10px 12px;border-radius:12px;font-weight:900;cursor:pointer;">
                    Сохранить
                </button>

                <a th:if="${editing}" th:href="@{/admin-db/buildings}"
                   style="text-decoration:none;text-align:center;border:1px solid #d8deea;padding:10px 12px;border-radius:12px;font-weight:900;color:#0b1b4d;">
                    Отменить
                </a>
            </form>
        </section>
    </div>
</main>

</body>
</html>
